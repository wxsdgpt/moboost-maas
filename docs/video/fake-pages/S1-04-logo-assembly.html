<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Scene 1 - Shot 4: Logo Reveal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: #000;
    width: 1920px; height: 1080px;
    overflow: hidden;
  }

  /* Full-screen canvas for all effects */
  canvas { position: absolute; inset: 0; z-index: 1; }

  /* Orbital rings behind logo */
  .orbital-system {
    position: absolute;
    top: 474px; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    width: 700px; height: 700px;
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  .orbital-system.show { opacity: 1; }

  .orbit-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid transparent;
    top: 50%; left: 50%;
  }
  .orbit-ring.r1 {
    width: 440px; height: 440px;
    margin: -220px 0 0 -220px;
    border-color: rgba(192,228,99,0.08);
    animation: orbitSpin 25s linear infinite;
  }
  .orbit-ring.r2 {
    width: 560px; height: 560px;
    margin: -280px 0 0 -280px;
    border-color: rgba(192,228,99,0.05);
    animation: orbitSpin 40s linear infinite reverse;
  }
  .orbit-ring.r3 {
    width: 680px; height: 680px;
    margin: -340px 0 0 -340px;
    border-color: rgba(192,228,99,0.03);
    animation: orbitSpin 55s linear infinite;
  }
  /* Dots on orbit rings — hidden initially, fade in after logo reveal */
  .orbit-dot {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #c0e463;
    box-shadow: 0 0 12px rgba(192,228,99,0.6);
    opacity: 0;
    transition: opacity 1s ease 0.5s;
  }
  .orbital-system.dots-visible .orbit-dot { opacity: 1; }
  .orbit-ring.r1 .orbit-dot { top: -3px; left: 50%; margin-left: -3px; }
  .orbit-ring.r2 .orbit-dot { top: 50%; right: -3px; margin-top: -3px; }
  .orbit-ring.r3 .orbit-dot { bottom: -3px; left: 30%; margin-left: -3px; }

  /* Center glow */
  .center-glow {
    position: absolute;
    top: 474px; left: 50%;
    transform: translate(-50%, -50%);
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(192,228,99,0.10) 0%,
      rgba(192,228,99,0.03) 35%,
      transparent 65%
    );
    z-index: 4;
    opacity: 0;
    transition: opacity 2s ease;
  }
  .center-glow.show { opacity: 1; }

  /* Light rays */
  .light-rays {
    position: absolute;
    top: 474px; left: 50%;
    transform: translate(-50%, -50%);
    width: 1200px; height: 1200px;
    z-index: 3;
    opacity: 0;
    transition: opacity 2s ease 0.3s;
  }
  .light-rays.show { opacity: 1; }
  .ray {
    position: absolute;
    top: 50%; left: 50%;
    width: 2px; height: 600px;
    transform-origin: bottom center;
    background: linear-gradient(to top, rgba(192,228,99,0.08), transparent);
  }

  /* Logo */
  .logo-wrap {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -52%);
    z-index: 10;
    opacity: 0;
    text-align: center;
  }
  .logo-wrap.show {
    animation: logoIn 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .logo-icon {
    width: 180px; height: 180px;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 50px rgba(255,255,255,0.15))
           drop-shadow(0 0 100px rgba(255,255,255,0.05));
    /* Icon starts tiny at circle center and scales up */
    transform: scale(0);
    transform-origin: 50% 50%;
  }
  .logo-wrap.show .logo-icon {
    animation: iconReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
  }
  /* Text and subtitle fade in after icon */
  .logo-text, .logo-tagline-sub {
    opacity: 0;
    transform: translateY(15px);
  }
  .logo-wrap.show .logo-text {
    animation: textFadeUp 0.8s ease 0.6s forwards;
  }
  .logo-wrap.show .logo-tagline-sub {
    animation: textFadeUp 0.8s ease 0.8s forwards;
  }
  .logo-text {
    font-size: 72px;
    font-weight: 800;
    letter-spacing: 4px;
    line-height: 1;
  }
  .logo-mo {
    color: #c0e463;
    text-shadow: 0 0 40px rgba(192,228,99,0.4);
  }
  .logo-boost {
    color: #ffffff;
    text-shadow: 0 0 30px rgba(255,255,255,0.15);
  }
  .logo-tagline-sub {
    margin-top: 12px;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 8px;
    color: rgba(192,228,99,0.5);
  }

  /* Tagline */
  .tagline {
    position: absolute;
    bottom: 240px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 34px; font-weight: 400; color: rgba(255,255,255,0);
    letter-spacing: 6px;
    transition: color 1.5s ease, letter-spacing 1.5s ease;
    white-space: nowrap;
  }
  .tagline.show {
    color: rgba(255,255,255,0.9);
    letter-spacing: 8px;
  }

  /* Horizontal accent line under tagline */
  .accent-line {
    position: absolute;
    bottom: 225px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(192,228,99,0.5), transparent);
    transition: width 1.5s ease 0.3s;
  }
  .accent-line.show { width: 360px; }

  @keyframes orbitSpin { to { transform: rotate(360deg); } }
  @keyframes logoIn {
    0% { opacity: 0; transform: translate(-50%, -52%) scale(1); }
    15% { opacity: 1; }
    100% { opacity: 1; transform: translate(-50%, -52%) scale(1); }
  }
  @keyframes iconReveal {
    0% { transform: scale(0); filter: blur(4px) brightness(3); }
    30% { transform: scale(1.08); filter: blur(0) brightness(1.5); }
    50% { transform: scale(0.97); filter: blur(0) brightness(1); }
    70% { transform: scale(1.02); }
    100% { transform: scale(1); filter: blur(0) brightness(1); }
  }
  @keyframes textFadeUp {
    0% { opacity: 0; transform: translateY(15px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

  <!-- Text logo matching platform navbar style -->
  <div class="logo-text">
    <span class="logo-mo">Mo</span><span class="logo-boost">boost</span>
  </div>
  <div class="logo-tagline-sub">A COMPANY TO CONNECT</div>
</div>

<div class="tagline" id="tagline">There's a better way.</div>
<div class="accent-line" id="accentLine"></div>

<script>
// Generate light rays
const raysEl = document.getElementById('rays');
for (let i = 0; i < 12; i++) {
  const ray = document.createElement('div');
  ray.className = 'ray';
  ray.style.transform = `rotate(${i * 30}deg) translateY(-50%)`;
  ray.style.opacity = 0.4 + Math.random() * 0.6;
  raysEl.appendChild(ray);
}

// Canvas: shatter → data stream → reveal
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1920, H = 1080, CX = W/2, CY = H/2 - 20;
// Exact screen position of the logo icon's center circle
// Calculated from: logo-wrap top:50% translate(-50%,-52%), icon 180x180, circle at SVG (110,110)/220
const LOGO_CX = 960, LOGO_CY = 474;

// --- Phase 1: Shatter (glitch from previous screen) ---
const shards = [];
for (let i = 0; i < 35; i++) {
  shards.push({
    x: CX + (Math.random()-0.5)*800,
    y: CY + (Math.random()-0.5)*500,
    w: 40 + Math.random()*250,
    h: 8 + Math.random()*40,
    vx: (Math.random()-0.5)*20,
    vy: (Math.random()-0.5)*14,
    // Use brand palette: muted reds and grays for "pain" shattering
    color: `rgba(${Math.random()<0.3?'180,40,40':'60,60,80'},${0.06+Math.random()*0.08})`,
    rot: (Math.random()-0.5)*0.15,
    angle: 0
  });
}

// --- Phase 2: Data stream particles rising ---
class StreamParticle {
  constructor() {
    this.reset();
    this.y = Math.random() * H; // start scattered
  }
  reset() {
    this.x = Math.random() * W;
    this.y = H + 20;
    this.vy = -(1.5 + Math.random() * 3);
    this.size = Math.random() < 0.15 ? 2.5 : (0.8 + Math.random() * 1.2);
    this.alpha = 0.15 + Math.random() * 0.35;
    // Brand green palette
    const r = Math.random();
    if (r < 0.4) this.color = '#c0e463';
    else if (r < 0.65) this.color = '#8aad3a';
    else if (r < 0.8) this.color = '#d4f08a';
    else this.color = 'rgba(255,255,255,0.25)';
  }
  update() {
    this.y += this.vy;
    // Subtle horizontal drift
    this.x += Math.sin(this.y * 0.008) * 0.3;
    if (this.y < -10) this.reset();
  }
  draw() {
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = this.color;
    // Elongated vertical shape for "data stream" feel
    ctx.fillRect(this.x, this.y, this.size * 0.6, this.size * 3);
  }
}

const streams = [];
for (let i = 0; i < 200; i++) streams.push(new StreamParticle());

// --- Phase 3: Converging light particles ---
class LightParticle {
  constructor() {
    const angle = Math.random() * Math.PI * 2;
    const dist = 500 + Math.random() * 600;
    this.x = LOGO_CX + Math.cos(angle) * dist;
    this.y = LOGO_CY + Math.sin(angle) * dist;
    this.size = 1 + Math.random() * 2;
    this.alpha = 0;
    this.color = Math.random() < 0.6 ? '#c0e463' : '#d4f08a';
    this.converging = false;
    this.speed = 0.02 + Math.random() * 0.03;
    this.trail = [];
  }
  update() {
    if (!this.converging) return;
    this.alpha = Math.min(0.7, this.alpha + 0.015);
    // Converge to the logo icon's center circle origin point
    this.x += (LOGO_CX - this.x) * this.speed;
    this.y += (LOGO_CY - this.y) * this.speed;
    // Trail
    this.trail.push({x: this.x, y: this.y, a: this.alpha});
    if (this.trail.length > 8) this.trail.shift();
  }
  draw() {
    // Trail
    this.trail.forEach((t, i) => {
      ctx.globalAlpha = t.a * (i / this.trail.length) * 0.3;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.size * 0.5, 0, Math.PI * 2);
      ctx.fill();
    });
    // Main dot
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    // Glow
    ctx.globalAlpha = this.alpha * 0.15;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 5, 0, Math.PI * 2);
    ctx.fill();
  }
}

const lights = [];
for (let i = 0; i < 80; i++) lights.push(new LightParticle());

// --- Timeline ---
let frame = 0;
const FPS = 60;
const T = {
  shatterEnd:    0.8 * FPS,
  fadeEnd:        1.3 * FPS,
  streamStart:   1.0 * FPS,
  convergeStart: 1.5 * FPS,
  burstFlash:    2.8 * FPS,   // flash burst when particles arrive
  logoShow:      2.9 * FPS,   // logo icon starts revealing from center
  dotsShow:      3.8 * FPS,   // orbit dots fade in after logo settles
  taglineShow:   3.5 * FPS,
};

// Flash burst state
let burstAlpha = 0;
let burstRadius = 0;

function animate() {
  frame++;
  ctx.globalAlpha = 1;

  // === Phase 1: Shatter ===
  if (frame <= T.shatterEnd) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, W, H);

    const fade = Math.max(0, 1 - frame / T.shatterEnd);
    shards.forEach(s => {
      s.x += s.vx; s.y += s.vy;
      s.vx *= 1.02; s.vy *= 1.02;
      s.angle += s.rot;
      ctx.save();
      ctx.translate(s.x + s.w/2, s.y + s.h/2);
      ctx.rotate(s.angle);
      ctx.globalAlpha = fade * 0.8;
      ctx.fillStyle = s.color;
      ctx.fillRect(-s.w/2, -s.h/2, s.w, s.h);
      ctx.restore();
    });

    // Subtle horizontal glitch lines
    if (frame % 5 === 0) {
      ctx.globalAlpha = 0.06;
      ctx.fillStyle = '#c0e463';
      ctx.fillRect(0, Math.random() * H, W, 1);
    }
  }
  // === Fade to black ===
  else if (frame <= T.fadeEnd) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
  }
  // === Phase 2+3: Streams + Convergence ===
  else {
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0, 0, W, H);

    // Data streams (subtle background)
    if (frame > T.streamStart) {
      streams.forEach(p => {
        p.update();
        p.draw();
      });
    }

    // Converging light particles — fade out after burst
    if (frame > T.convergeStart) {
      const fadeOutAfterBurst = frame > T.burstFlash ? Math.max(0, 1 - (frame - T.burstFlash) / 20) : 1;
      lights.forEach(p => {
        if (!p.converging) p.converging = true;
        p.update();
        if (fadeOutAfterBurst > 0) {
          const origAlpha = p.alpha;
          p.alpha *= fadeOutAfterBurst;
          p.draw();
          p.alpha = origAlpha;
        }
      });
    }

    // Growing glow at convergence point — intensifies as particles arrive
    const glowProgress = Math.min(1, (frame - T.fadeEnd) / (T.burstFlash - T.fadeEnd));
    if (glowProgress > 0 && frame < T.burstFlash + 30) {
      const r = 80 + glowProgress * 220;
      const intensity = glowProgress * 0.12;
      const grad = ctx.createRadialGradient(LOGO_CX, LOGO_CY, 0, LOGO_CX, LOGO_CY, r);
      grad.addColorStop(0, `rgba(192,228,99,${intensity})`);
      grad.addColorStop(0.4, `rgba(192,228,99,${intensity * 0.3})`);
      grad.addColorStop(1, 'transparent');
      ctx.globalAlpha = 1;
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(LOGO_CX, LOGO_CY, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // === Burst flash — bright white+green flash from center when particles arrive ===
    if (frame >= T.burstFlash) {
      const burstAge = (frame - T.burstFlash) / FPS;
      if (burstAge < 0.6) {
        // Quick flash: white core expanding outward
        const flashAlpha = Math.max(0, 1 - burstAge / 0.4);
        const flashR = 40 + burstAge * 800;
        // White core
        const grad1 = ctx.createRadialGradient(LOGO_CX, LOGO_CY, 0, LOGO_CX, LOGO_CY, flashR);
        grad1.addColorStop(0, `rgba(255,255,255,${flashAlpha * 0.7})`);
        grad1.addColorStop(0.15, `rgba(192,228,99,${flashAlpha * 0.4})`);
        grad1.addColorStop(0.5, `rgba(192,228,99,${flashAlpha * 0.08})`);
        grad1.addColorStop(1, 'transparent');
        ctx.globalAlpha = 1;
        ctx.fillStyle = grad1;
        ctx.beginPath();
        ctx.arc(LOGO_CX, LOGO_CY, flashR, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // === Trigger DOM elements ===
  if (frame === Math.floor(T.convergeStart)) {
    document.getElementById('glow').classList.add('show');
    document.getElementById('rays').classList.add('show');
  }
  // Show orbits (without dots) a bit before logo
  if (frame === Math.floor(T.burstFlash)) {
    document.getElementById('orbits').classList.add('show');
  }
  if (frame === Math.floor(T.logoShow)) {
    document.getElementById('logo').classList.add('show');
  }
  // Orbit dots fade in after logo animation settles
  if (frame === Math.floor(T.dotsShow)) {
    document.getElementById('orbits').classList.add('dots-visible');
  }
  if (frame === Math.floor(T.taglineShow)) {
    document.getElementById('tagline').classList.add('show');
    document.getElementById('accentLine').classList.add('show');
  }

  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}

animate();
</script>
