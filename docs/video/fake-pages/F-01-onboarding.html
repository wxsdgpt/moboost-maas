<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Moboost - Onboarding</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* SF Pro Display - system font, no import needed */

  :root {
    --bg-dark: #0a0a0a;
    --bg-card: rgba(255,255,255,0.04);
    --brand-purple: #c0e463;
    --brand-purple-glow: rgba(192,228,99,0.3);
    --text-white: #ffffff;
    --text-gray: #8a8a9a;
    --text-dim: #555566;
  }

  body {
    font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg-dark);
    color: var(--text-white);
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Top nav bar */
  .navbar {
    height: 56px;
    background: rgba(10,10,10,0.85); backdrop-filter: saturate(120%) blur(24px);
    border-bottom: 1px solid rgba(192,228,99,0.15);
    display: flex;
    align-items: center;
    padding: 0 32px;
    backdrop-filter: blur(10px);
  }
  .navbar .logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .navbar .logo span { color: var(--brand-purple); }
  .navbar .nav-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .navbar .nav-right .step-indicator {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .step-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.3s;
  }
  .step-dot.active { background: var(--brand-purple); width: 24px; border-radius: 4px; }
  .step-dot.done { background: var(--brand-purple); opacity: 0.5; }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Background grid */
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(192,228,99,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(192,228,99,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* Radial glow behind center */
  .bg-glow {
    position: absolute;
    width: 800px; height: 800px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(192,228,99,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .welcome-title {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -1.5px;
    margin-bottom: 12px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s ease forwards 0.3s;
    z-index: 1;
  }
  .welcome-title span { color: var(--brand-purple); }

  .welcome-sub {
    font-size: 18px;
    color: var(--text-gray);
    margin-bottom: 48px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s ease forwards 0.6s;
    z-index: 1;
  }

  /* Input container */
  .input-container {
    position: relative;
    z-index: 1;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s ease forwards 0.9s;
  }
  .input-wrapper {
    display: flex;
    align-items: center;
    background: var(--bg-card);
    border: 1px solid rgba(192,228,99,0.3);
    border-radius: 12px;
    padding: 6px 6px 6px 24px;
    width: 640px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .input-wrapper:focus-within,
  .input-wrapper.active {
    border-color: var(--brand-purple);
    box-shadow: 0 0 30px var(--brand-purple-glow);
  }
  .input-icon {
    color: var(--text-dim);
    margin-right: 12px;
    font-size: 20px;
  }
  .url-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-white);
    font-size: 17px;
    font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    outline: none;
    caret-color: #c0e463;
    letter-spacing: 0.2px;
  }
  .url-input::placeholder { color: var(--text-dim); }

  .analyze-btn {
    background: linear-gradient(135deg, #c0e463, #a8d44a); color: #0a0a0a;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    cursor: pointer;
    transition: all 0.3s;
    opacity: 0.4;
    pointer-events: none;
  }
  .analyze-btn.ready {
    opacity: 1;
    pointer-events: all;
    animation: btnPulse 2s ease-in-out infinite;
  }

  .hint-text {
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-dim);
    z-index: 1;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.2s;
  }

  /* Features below */
  .features {
    position: absolute;
    bottom: 80px;
    display: flex;
    gap: 64px;
    z-index: 1;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.5s;
  }
  .feature-item {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-dim);
    font-size: 14px;
  }
  .feature-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(192,228,99,0.1);
    display: flex; align-items: center; justify-content: center;
    color: var(--brand-purple);
    font-size: 16px;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(192,228,99,0.4); }
    50% { box-shadow: 0 0 20px 4px rgba(192,228,99,0.3); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  .cursor-blink::after {
    content: '|';
    animation: blink 1s step-end infinite;
    color: var(--brand-purple);
    font-weight: 300;
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo"><span>Mo</span>boost</div>
  <div class="nav-right">
    <div class="step-indicator">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
  </div>
</nav>

<div class="main">
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <h1 class="welcome-title">Welcome to <span>Moboost</span></h1>
  <p class="welcome-sub">Paste your brand website and let AI do the rest</p>

  <div class="input-container">
    <div class="input-wrapper" id="inputWrapper">
      <span class="input-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
      </span>
      <input type="text" class="url-input" id="urlInput" placeholder="Enter your brand website URL..." readonly>
      <button class="analyze-btn" id="analyzeBtn">Analyze Brand</button>
    </div>
  </div>
  <p class="hint-text">We'll analyze your website to extract brand identity, products, and audience insights</p>

  <div class="features">
    <div class="feature-item">
      <div class="feature-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <span>Brand-safe AI</span>
    </div>
    <div class="feature-item">
      <div class="feature-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <span>Analysis in seconds</span>
    </div>
    <div class="feature-item">
      <div class="feature-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <span>Multi-language support</span>
    </div>
    <div class="feature-item">
      <div class="feature-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      </div>
      <span>Creative asset generation</span>
    </div>
  </div>
</div>

<script>
  const input = document.getElementById('urlInput');
  const wrapper = document.getElementById('inputWrapper');
  const btn = document.getElementById('analyzeBtn');
  const url = 'www.pawsdelight.com';
  let charIndex = 0;

  // Start typing after 3 seconds
  setTimeout(() => {
    wrapper.classList.add('active');
    typeUrl();
  }, 3000);

  function typeUrl() {
    if (charIndex < url.length) {
      input.value = url.substring(0, charIndex + 1);
      charIndex++;
      // Variable typing speed for realism
      const delay = 60 + Math.random() * 80;
      setTimeout(typeUrl, delay);
    } else {
      // Typing complete - activate button
      setTimeout(() => {
        btn.classList.add('ready');
      }, 400);
    }
  }
</script>
</body>
</html>
